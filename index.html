<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzProWap - XoЕҹ GЙҷldiniz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            padding: 80px 50px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .greeting {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 1s ease-out;
            letter-spacing: -1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            border-radius: 20px;
            padding: 35px 25px;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        }

        .time-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .date-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .card-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .card-display {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .date-card .card-display {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            margin: 30px auto;
            border-radius: 2px;
        }

        .footer {
            font-size: 0.9rem;
            color: #666;
            margin-top: 30px;
        }

        .footer p {
            margin: 8px 0;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #764ba2;
        }

        .emoji {
            font-size: 1.2em;
            margin-right: 8px;
        }

        @media (max-width: 700px) {
            .container {
                padding: 50px 30px;
            }

            .greeting {
                font-size: 2.5rem;
            }

            .cards-wrapper {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card {
                padding: 30px 20px;
            }

            .card-display {
                font-size: 1.8rem;
            }

            .date-card .card-display {
                font-size: 1.4rem;
            }

            .logo {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }

            .greeting {
                font-size: 2rem;
            }

            .card {
                padding: 25px 15px;
            }

            .card-display {
                font-size: 1.5rem;
            }

            .date-card .card-display {
                font-size: 1.2rem;
            }

            .card-label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">рҹҢҹ</div>
        <div class="greeting" id="greeting">SabahДұnДұz xeyir</div>
        
        <div class="divider"></div>

        <div class="cards-wrapper">
            <div class="card time-card">
                <div class="card-label"><span class="emoji">вҸ°</span>BakДұ SaatДұ</div>
                <div class="card-display" id="time">00:00:00</div>
            </div>
            
            <div class="card date-card">
                <div class="card-label"><span class="emoji">рҹ“…</span>Cari Tarix</div>
                <div class="card-display" id="date">1 Yanvar 2024</div>
            </div>
        </div>

        <div class="divider"></div>
        
        <div class="footer">
            <p>вңЁ <strong>AzProWap</strong> - MГјasДұr Web SaytДұ</p>
            <p>GitLab Pages ilЙҷ yayДұmlanmДұЕҹdДұr</p>
        </div>
    </div>

    <script>
        const azMonths = [
            'Yanvar', 'Fevral', 'Mart', 'Aprel', 'May', 'Д°yun',
            'Д°yul', 'Avqust', 'Sentyabr', 'Oktyabr', 'Noyabr', 'Dekabr'
        ];

        const azDays = [
            'Bazar', 'Bazar ertЙҷsi', 'ГҮЙҷrЕҹЙҷnbЙҷ', 'ГҮЙҷrЕҹЙҷnbЙҷ axЕҹamДұ',
            'CГјmЙҷ axЕҹamДұ', 'CГјmЙҷ', 'ЕһЙҷnbЙҷ'
        ];

        function updateTime() {
            const now = new Date();
            const bakuTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Baku' }));
            
            const hours = String(bakuTime.getHours()).padStart(2, '0');
            const minutes = String(bakuTime.getMinutes()).padStart(2, '0');
            const seconds = String(bakuTime.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            const hour = bakuTime.getHours();
            let greeting = 'AxЕҹamДұnДұz xeyir';
            
            if (hour >= 5 && hour < 12) {
                greeting = 'SabahДұnДұz xeyir';
            } else if (hour >= 12 && hour < 18) {
                greeting = 'GГјnortanДұz xeyir';
            }
            
            document.getElementById('greeting').textContent = greeting;
        }

        function updateDate() {
            const now = new Date();
            const bakuDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Baku' }));
            
            const day = bakuDate.getDate();
            const month = azMonths[bakuDate.getMonth()];
            const year = bakuDate.getFullYear();
            const dayName = azDays[bakuDate.getDay()];
            
            document.getElementById('date').textContent = `${dayName}, ${day} ${month} ${year}`;
        }

        updateTime();
        updateDate();
        
        setInterval(updateTime, 1000);
        setInterval(updateDate, 60000);
    </script>
</body>
</html>
