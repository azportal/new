<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xoş Gəldiniz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .time-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            color: white;
        }

        .time-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .date-section {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
        }

        .date-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-display {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            .greeting {
                font-size: 1.8rem;
            }

            .time-display {
                font-size: 1.6rem;
            }

            .date-display {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 30px 20px;
            }

            .greeting {
                font-size: 1.5rem;
            }

            .time-display {
                font-size: 1.4rem;
            }

            .date-display {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting" id="greeting">Sabahınız xeyir</div>
        
        <div class="time-section">
            <div class="time-label">Bakı Saatı</div>
            <div class="time-display" id="time">00:00:00</div>
        </div>
        
        <div class="date-section">
            <div class="date-label">Cari Tarix</div>
            <div class="date-display" id="date">1 Yanvar 2024</div>
        </div>
        
        <div class="footer">
            <p>GitLab Pages ilə yayımlanmışdır</p>
        </div>
    </div>

    <script>
        const azMonths = [
            'Yanvar', 'Fevral', 'Mart', 'Aprel', 'May', 'İyun',
            'İyul', 'Avqust', 'Sentyabr', 'Oktyabr', 'Noyabr', 'Dekabr'
        ];

        const azDays = [
            'Bazar', 'Bazar ertəsi', 'Çərşənbə', 'Çərşənbə axşamı',
            'Cümə axşamı', 'Cümə', 'Şənbə'
        ];

        function updateTime() {
            // Bakı saatı (UTC+4)
            const now = new Date();
            const bakuTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Baku' }));
            
            // Saat, dəqiqə, saniyə
            const hours = String(bakuTime.getHours()).padStart(2, '0');
            const minutes = String(bakuTime.getMinutes()).padStart(2, '0');
            const seconds = String(bakuTime.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Dinamik salamlaşma
            const hour = bakuTime.getHours();
            let greeting = 'Axşamınız xeyir';
            
            if (hour >= 5 && hour < 12) {
                greeting = 'Sabahınız xeyir';
            } else if (hour >= 12 && hour < 18) {
                greeting = 'Günortanız xeyir';
            }
            
            document.getElementById('greeting').textContent = greeting;
        }

        function updateDate() {
            const now = new Date();
            const bakuDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Baku' }));
            
            const day = bakuDate.getDate();
            const month = azMonths[bakuDate.getMonth()];
            const year = bakuDate.getFullYear();
            const dayName = azDays[bakuDate.getDay()];
            
            document.getElementById('date').textContent = `${dayName}, ${day} ${month} ${year}`;
        }

        // İlk yükləmə
        updateTime();
        updateDate();
        
        // Hər saniyə yenilə
        setInterval(updateTime, 1000);
        
        // Hər dəqiqə tarixi yenilə
        setInterval(updateDate, 60000);
    </script>
</body>
</html>
