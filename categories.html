<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="7KYCp6OVjOrZB_TTBfOI8X-d6JSOlyjRtp3NDhplsCY" />
    <meta name="google-site-verification" content="xd5sf4oz2nt6" />
    <meta name="yandex-verification" content="077145342cf7f4c9" />
    <meta name="description" content="SEO sözləri kateqoriyaları. Bütün kateqoriyaları kəşf edin. Android APK, SEO, Marketing və daha çox.">
    <meta name="keywords" content="kateqoriyalar, seo kateqoriyaları, sözlər, android apk, apk indir">
    <title>Kateqoriyalar | AzProWap - 100,000+ SEO Sözləri</title>
    <link rel="canonical" href="https://azportal.github.io/new/categories.html">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌟 AzProWap</div>
            <ul class="nav-menu">
                <li><a href="index.html">Ana səhifə</a></li>
                <li><a href="top-words.html">Top Sözlər</a></li>
                <li><a href="categories.html" class="active">Kateqoriyalar</a></li>
                <li><a href="daily-word.html">Günün Sözü</a></li>
                <li><a href="about.html">Haqqımızda</a></li>
                <li><a href="contact.html">Əlaqə</a></li>
                <li><a href="admin.html" style="color: #f093fb;">🔐 Admin</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section style="padding: 60px 0;">
        <div class="container">
            <h1 style="text-align: center; color: #667eea; margin-bottom: 40px;">Kateqoriyalar</h1>
            <div class="categories-grid" id="categories-list">
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 Azmedia Pro tərəfindən bütün hüquqlar qorunur</p>
                <p>Müəllif: <strong>Azmedia</strong></p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedCategories = localStorage.getItem('categories');
            
            if (savedCategories) {
                const categories = JSON.parse(savedCategories);
                renderCategories(categories);
            } else {
                fetch('data/keywords.json')
                    .then(response => response.json())
                    .then(data => renderCategories(data.categories));
            }
        });

        function renderCategories(categories) {
            const container = document.getElementById('categories-list');
            container.innerHTML = Object.entries(categories).map(([key, category]) => `
                <div class="category-card">
                    <a href="category.html?id=${key}">
                        <h3>${category.name}</h3>
                        <div class="category-count">${category.count} söz</div>
                    </a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
